<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="80" fill="#2d2d2d"/>
  <!-- Calendar body -->
  <rect x="68" y="148" width="376" height="296" rx="20" fill="#f5f3f0"/>
  <!-- Header bar -->
  <rect x="68" y="148" width="376" height="104" rx="20" fill="#4a4a4a"/>
  <rect x="68" y="208" width="376" height="44" fill="#4a4a4a"/>
  <!-- Ring posts -->
  <rect x="164" y="88" width="24" height="96" rx="12" fill="#888"/>
  <rect x="324" y="88" width="24" height="96" rx="12" fill="#888"/>
  <!-- Grid rows (calendar lines) -->
  <rect x="92" y="296" width="328" height="10" rx="5" fill="#dedad4"/>
  <rect x="92" y="332" width="328" height="10" rx="5" fill="#dedad4"/>
  <rect x="92" y="368" width="240" height="10" rx="5" fill="#dedad4"/>
  <!-- Accent dot (today marker) -->
  <rect x="92" y="260" width="60" height="10" rx="5" fill="#c0241a"/>
  <!-- White text lines in header -->
  <rect x="104" y="168" width="88" height="10" rx="4" fill="rgba(255,255,255,0.5)"/>
  <rect x="204" y="168" width="140" height="10" rx="4" fill="rgba(255,255,255,0.3)"/>
</svg>
